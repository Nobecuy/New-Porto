<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MyPortofolio — Frontend developer in progress. Projects, learning log, and honest skill levels."
    />
    <meta name="theme-color" content="#fafafa" />
    <title>MyPortofolio — Frontend Developer in Progress</title>
    <script>
      (() => {
        try {
          window.__APP_LOADER_START__ = Date.now();
          const stored = localStorage.getItem("theme");
          const theme =
            stored === "dark" || stored === "light"
              ? stored
              : window.matchMedia &&
                  window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_) {}
      })();
    </script>
    <style>
      :root {
        --loader-bg: #fafafa;
        --loader-fg: #0a0a0a;
        --loader-muted: rgba(10, 10, 10, 0.7);
        --loader-border: rgba(10, 10, 10, 0.12);
      }

      html[data-theme="dark"] {
        --loader-bg: #0a0a0a;
        --loader-fg: #fafafa;
        --loader-muted: rgba(250, 250, 250, 0.7);
        --loader-border: rgba(250, 250, 250, 0.18);
      }

      #app-loader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: var(--loader-bg);
        color: var(--loader-fg);
        z-index: 9999;
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }

      #app-loader .loader-inner {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border: 1px solid var(--loader-border);
        border-radius: 9999px;
        background: transparent;
      }

      #app-loader .spinner {
        width: 16px;
        height: 16px;
        border-radius: 9999px;
        border: 2px solid var(--loader-border);
        border-top-color: var(--loader-fg);
        animation: spin 0.8s linear infinite;
      }

      #app-loader .label {
        font: 500 13px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        letter-spacing: 0.02em;
        color: var(--loader-muted);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-loader {
          transition: none;
        }
        #app-loader .spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader" aria-hidden="true">
      <div class="loader-inner">
        <div class="spinner" aria-hidden="true"></div>
        <span class="label">Loading…</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
